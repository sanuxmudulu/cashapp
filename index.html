<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>iPhone User Feedback</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #111;
      border-radius: 20px;
      padding: 36px 24px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .badge {
      display: inline-block;
      background: #fff;
      color: #000;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 12px;
      line-height: 1.3;
    }
    .subtext {
      font-size: 15px;
      color: #aaa;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .question {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 20px;
    }
    .option {
      display: block;
      width: 100%;
      background: #1a1a1a;
      color: #fff;
      border: 1px solid #333;
      border-radius: 14px;
      padding: 16px;
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
    }
    .option:hover {
      background: #222;
      border-color: #555;
    }
    .footer {
      margin-top: 28px;
      font-size: 11px;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">iPhone Users Only</div>
    <h1>Quick Question For iPhone Users</h1>
    <p class="subtext">iPhone users in your area are being selected for an exclusive Apple Pay program</p>
    <p class="question">How often do you use Apple Pay?</p>
    <a href="claim.html" class="option">Every day</a>
    <a href="claim.html" class="option">A few times a week</a>
    <a href="claim.html" class="option">Rarely / Never</a>
    <p class="footer">Program availability may vary by region</p>
  </div>
</body>
</html>
